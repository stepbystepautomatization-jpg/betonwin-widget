<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetonWin Widget Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      min-height: 100vh;
      font-family: -apple-system, system-ui, sans-serif;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.04) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .demo-content {
      text-align: center;
      opacity: 0.2;
    }
    .demo-content h1 {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: -1px;
    }
    .demo-content p {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="demo-content">
    <h1>beton.win</h1>
    <p>Click the green orb to open support</p>
  </div>
  <div id="__beton_widget__"></div>
  <script src="widget.js"></script>
</body>
</html>
